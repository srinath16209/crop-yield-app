<!DOCTYPE html>
<html>
<head>
    <title>Predict Crop Yield</title>
    <link rel="stylesheet" href="./../static/style.css">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            background-image: url(./../static/Agriculture.png);
            background-repeat: no-repeat;
            background-size: cover;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        form{
            width: 60%;
            background-color: rgba(0,0,0, 0.1);
            background: none;
        }
        h2 {
            text-align: center;
            margin-top: 30px;
            color: #2c3e50;
            font-size: 1.7rem;
            text-shadow: 1px 1px 2px #fff;
        }
form>.form-container {
    display: flex;
    border: 2px solid #2c3e50;
    border-radius: 10px;
    padding: 20px;
    width: 70%;
    max-width: 900px;
    margin: 30px auto;

    background-color: rgba(255, 255, 255, 0.7); /* ADD THIS */
    backdrop-filter: blur(5px); /* ADD THIS */
}

        .column {
            flex: 1;
            padding: 15px;
        }

        .form-container label {
            display: block;
            margin-bottom: 10px;
            color: #000;
    font-weight: bold;
            
        }

        .form-container input {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #aaa;
            border-radius: 5px;
            transition: 0.3s;
             background-color: #fff;
    color: #000;
        }

        .form-container input:focus {
            border-color: #2c3e50;
            outline: none;
            box-shadow: 0 0 5px rgba(44,62,80,0.5);
        }

        .button-container {
            text-align: center;
            margin-top: 25px;
        }

        button:hover{
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            font-weight: bold;
        }
        button{
            font-size: 1.2rem;
            padding: 10px 20px;
        }
        @media (max-width: 768px) {
    form > .form-container {
        flex-direction: column;
        width: 95%;
        padding: 10px;
    }

    .column {
        width: 100%;
        padding: 5px;
    }

    form {
        width: 95% !important;
    }
}
        

    </style>
</head>
<body>
    <h2>🌱 Crop Yield Prediction Form</h2>
    <form method="POST">
        <div class="form-container" style="color: rgb(6, 6, 6);">
            <div class="column">
                <label>N: <input type="text" name="N"></label>
                <label>P: <input type="text" name="P"></label>
                <label>K: <input type="text" name="K"></label>
                <label>Soil pH: <input type="text" name="Soil_pH"></label>
                <label>Soil Moisture: <input type="text" name="Soil_Moisture"></label>
                <label>Organic Carbon: <input type="text" name="Organic_Carbon"></label>
                <label>Temperature: <input type="text" name="Temperature"></label>
                 <label>Humidity: <input type="text" name="Humidity"></label>
            </div>

            <div class="column">
               
                <label>Rainfall: <input type="text" name="Rainfall"></label>
                <label>Sunlight Hours: <input type="text" name="Sunlight_Hours"></label>
                <label>Wind Speed: <input type="text" name="Wind_Speed"></label>
                <label>Altitude: <input type="text" name="Altitude"></label>
                <label>Fertilizer Used: <input type="text" name="Fertilizer_Used"></label>
                <label>Pesticide Used: <input type="text" name="Pesticide_Used"></label>
                <label>Hectares: <input type="text" name="Hectares"></label>
            </div>
        </div>

        <div class="button-container">
            <button type="submit">Predict</button>
        </div>
    </form>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
